<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <header class="top-panel">
        <a class="ligyb big" href="#about">Ligyb</a>
        <nav class="nav" aria-label="Navigation">
            <a class="nav-link" href="#about">About</a>
            <a class="nav-link" href="#projects">Projects</a>
            <a class="nav-link" href="#skills">Skills</a>
            <a class="nav-link" href="#contact">Contact</a>
        </nav>
    </header>

    <main class="about" id="about">
        <img class="avatar" src="src/icon.png" alt="Avatar">
        <div class="about-info">
            <h1 class="name">Hello, I am <span class="ligyb">Ligyb</span></h1>
            <p class="description">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </div>
    </main>


    <div class="projects">
        <div class="section-name">
            <h2 id="projects">Projects</h2>
        </div>
        <div class="project-list">
            <div class="project-item">
                <!-- TODO: if no image, simple code text or smth -->
                 <div class="project-icon">
                    <img class="project-image" src="src/project1.png" alt="Project 1">
                 </div>
                 <div class="project-info">
                    <p class="project-name">Project 1</p>
                    <p class="project-description">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                 </div>
                 <div class="tags">
                    <span class="tag">Tag1</span>
                    <span class="tag">Tag2</span>
                 </div>
                 <div class="project-buttons">
                    <a class="project-button" href="#">Github</a>
                    <a class="project-button" href="#">Another link idk</a>
                 </div>
            </div>
        </div>
    </div>

    <div class="skills">
        <div class="section-name">
            <h2 id="skills">Skills</h2>
        </div>
        <div class="section-panel">
            <div class="skill-group">
                <p class="group-name">Unity idk</p>
                <div class="tags">
                    <span class="tag">Tag1</span>
                    <span class="tag">Tag2</span>
                    <span class="tag">Tag3</span>
                </div>
            </div>
        </div>
    </div>

    <div class="contact">
        <div class="section-name">
            <h2 id="contact">Contact</h2>
        </div>
        <div class="tags">
            <a class="tag" href="https://google.com" target="_blank">Google</a>
            <a class="tag" href="https://github.com" target="_blank">GitHub</a>
            <a class="tag" href="https://linkedin.com" target="_blank">LinkedIn</a>
        </div>
    </div>
</body>
</html>
